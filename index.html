  <script>
    var LIFF_ID = "2010106417-lLCmAcx2";
    var GAS_API_URL = "https://script.google.com/macros/s/AKfycbzdX6xdKv9bGb-RWeMWet059muWd_Lm0RjsUDdWGbSNrdid_rozpjpHgK4lYW7OJKPs/exec";
    var liffReady = false;
    var liffUserId = "";
    var liffDisplayName = "";
    var selectedSlotKey = "";
    var monthAvailability = {};
    var calendarCache = {};
    var CALENDAR_CACHE_MAX_AGE_MS = 30000;
    var isMonthLoading = false;
    var isSubmittingBooking = false;
    var lastPageHiddenAt = 0;
    var PERIOD_RULES = {
      morning:{
        label:"\u4e0a\u5348",
        starts:["08:00","08:30","09:00"],
        ends:["11:00","11:30","12:00"],
        defaultStart:"08:00",
        defaultEnd:"12:00"
      },
      afternoon:{
        label:"\u4e0b\u5348",
        starts:["13:30","14:00","14:30"],
        ends:["16:30","17:00","17:30"],
        defaultStart:"13:30",
        defaultEnd:"17:30"
      },
      evening:{
        label:"\u665a\u4e0a",
        starts:["17:30"],
        ends:["20:30"],
        defaultStart:"17:30",
        defaultEnd:"20:30"
      }
    };
    var calendarViewDate = new Date();

    function t(key){
      var map = {
        submit:"\u9001\u51fa\u9810\u7d04",
        submitting:"\u9810\u7d04\u8cc7\u6599\u50b3\u9001\u4e2d...",
        liffFail:"LIFF \u521d\u59cb\u5316\u5931\u6557\uff1a",
        missingTitle:"\u8cc7\u6599\u672a\u5b8c\u6210",
        needName:"\u8acb\u8f38\u5165\u59d3\u540d",
        needPhone:"\u8acb\u8f38\u5165\u96fb\u8a71",
        needAddress:"\u8acb\u8f38\u5165\u670d\u52d9\u5730\u5740",
        needDate:"\u8acb\u9078\u64c7\u65e5\u671f",
        needPeriod:"\u8acb\u9078\u64c7\u6642\u6bb5",
        loadingSlots:"\u6b63\u5728\u67e5\u8a62\u7a7a\u6a94...",
        slotFail:"\u7a7a\u6a94\u67e5\u8a62\u5931\u6557",
        apiFail:"\u7cfb\u7d71\u9023\u7dda\u5931\u6557\uff0c\u8acb\u91cd\u65b0\u958b\u555f\u9810\u7d04\u9801\u518d\u8a66\u3002",
        needSlot:"\u8acb\u5148\u9ede\u9078\u4e0a\u65b9\u7da0\u8272\u53ef\u9810\u7d04\u6642\u6bb5",
        available:"\u53ef\u9810\u7d04 ",
        full:"\u5df2\u6eff ",
        submittingStatus:"\u9810\u7d04\u9001\u51fa\u4e2d\uff0c\u8acb\u7a0d\u5019...",
        bookedTitle:"\u6642\u6bb5\u5df2\u88ab\u9810\u7d04",
        bookedFallback:"\u8acb\u91cd\u65b0\u9078\u64c7\u6642\u6bb5\u3002",
        failedTitle:"\u9810\u7d04\u5931\u6557",
        failedFallback:"\u8acb\u7a0d\u5f8c\u518d\u8a66\u3002",
        successTitle:"\u9810\u7d04\u6210\u529f",
        successText:"\u6b63\u5728\u540c\u6b65\u660e\u7d30\u5230 LINE \u804a\u5929\u5ba4...",
        notLine:"\u9810\u7d04\u6210\u529f\u3002\u6b64\u9801\u4e0d\u662f\u5728 LINE \u5167\u958b\u555f\uff0c\u56e0\u6b64\u4e0d\u6703\u81ea\u52d5\u95dc\u9589\u3002",
        lineFail:"LINE \u50b3\u8a0a\u5931\u6557\uff1a",
        connectionFail:"\u9023\u7dda\u5931\u6557"
      };
      return map[key] || key;
    }

    function triggerHaptic(type){
      if(!("vibrate" in navigator)){
        return;
      }

      try{
        if(type == "success"){
          navigator.vibrate([40,60,40]);
          return;
        }

        navigator.vibrate(20);
      }catch(error){
      }
    }

    function showStatus(message,isError){
      var box = document.getElementById("statusBox");
      box.textContent = message;
      box.className = "status" + (isError ? " error" : "");
      box.style.display = "block";
    }

    function setLoading(isLoading){
      var btn = document.getElementById("submitBtn");
      var overlay = document.getElementById("loadingOverlay");
      isSubmittingBooking = !!isLoading;
      btn.disabled = isLoading;
      btn.textContent = isLoading ? t("submitting") : t("submit");
      if(overlay){
        overlay.classList.toggle("active",!!isLoading);
        overlay.setAttribute("aria-hidden",isLoading ? "false" : "true");
      }
    }

    function expandBookingFormPanel(){
      updateBookingProgress();
    }

    function updateBookingProgress(){
      var fill = document.getElementById("bookingProgressFill");
      var stepDate = document.getElementById("bookingProgressStepDate");
      var stepTime = document.getElementById("bookingProgressStepTime");
      var stepInfo = document.getElementById("bookingProgressStepInfo");
      if(!fill || !stepDate || !stepTime || !stepInfo){
        return;
      }

      var date = document.getElementById("b_date").value;
      var hasTime = selectedSlotKey != "";
      var requiredIds = [
        "b_name",
        "b_phone",
        "b_address",
        "b_service",
        "b_roomType"
      ];
      var filledCount = requiredIds.reduce(function(count,id){
        var el = document.getElementById(id);
        return count + (el && String(el.value || "").trim() != "" ? 1 : 0);
      },0);
      var progress =
        date ? 40 : 20;

      if(hasTime){
        progress = 60 + filledCount * 8;
      }

      stepDate.classList.add("active");
      stepTime.classList.toggle("active",date != "");
      stepInfo.classList.toggle("active",hasTime);
      fill.style.width =
        Math.min(100,progress) + "%";
    }

    function normalizePhoneInput(){
      var phone = document.getElementById("b_phone");
      if(!phone){
        return;
      }

      var cleanValue =
        String(phone.value || "").replace(/[^0-9]/g,"");
      if(phone.value != cleanValue){
        phone.value = cleanValue;
      }
    }

    function bindBookingProgressEvents(){
      [
        "b_name",
        "b_phone",
        "b_address",
        "b_service",
        "b_roomType",
        "b_pet",
        "b_note",
        "b_date",
        "b_period",
        "b_startTime",
        "b_endTime"
      ].forEach(function(id){
        var el = document.getElementById(id);
        if(!el){
          return;
        }
        el.addEventListener("input",updateBookingProgress);
        el.addEventListener("change",updateBookingProgress);
      });

      var phone =
        document.getElementById("b_phone");
      if(phone){
        phone.addEventListener("input",function(){
          normalizePhoneInput();
          updateBookingProgress();
        });
      }
    }

    function initLiff(){
      return liff.init({ liffId: LIFF_ID })
        .then(function(){
          liffReady = true;
          if(!liff.isLoggedIn() && liff.isInClient()){
            liff.login();
            return;
          }
          if(liff.isLoggedIn()){
            return liff.getProfile()
              .then(function(profile){
                liffUserId =
                  profile && profile.userId ?
                  profile.userId :
                  "";
                liffDisplayName =
                  profile && profile.displayName ?
                  profile.displayName :
                  "";
              })
              .catch(function(){
                liffUserId = "";
                liffDisplayName = "";
              });
          }
        })
        .catch(function(error){
          showStatus(t("liffFail") + (error.message || error), true);
        });
    }

    function syncDefaultTime(){
      selectedSlotKey = "";
      var period = document.getElementById("b_period").value;
      var rule = PERIOD_RULES[period] || PERIOD_RULES.morning;
      setSelectOptions(document.getElementById("b_startTime"),rule.starts);
      document.getElementById("b_startTime").value = rule.defaultStart;
      syncEndTimeOptions(rule.defaultEnd);
      updateBookingProgress();
    }

    function syncEndTimeOptions(preferredEnd){
      var period = document.getElementById("b_period").value;
      var rule = PERIOD_RULES[period] || PERIOD_RULES.morning;
      var start = document.getElementById("b_startTime").value || rule.defaultStart;
      var minEnd = minutesFromTime(start) + 180;
      var validEnds = rule.ends.filter(function(time){
        return minutesFromTime(time) >= minEnd;
      });
      if(validEnds.length == 0){
        validEnds = [rule.defaultEnd];
      }
      setSelectOptions(document.getElementById("b_endTime"),validEnds);
      document.getElementById("b_endTime").value =
        validEnds.indexOf(preferredEnd) >= 0 ? preferredEnd : validEnds[validEnds.length - 1];
    }

    function setSelectOptions(select,values){
      select.innerHTML = "";
      values.forEach(function(value){
        var option = document.createElement("option");
        option.value = value;
        option.textContent = value;
        select.appendChild(option);
      });
    }

    function minutesFromTime(value){
      var parts = String(value || "00:00").split(":");
      return Number(parts[0]) * 60 + Number(parts[1]);
    }

    function getPeriodText(period){
      if(PERIOD_RULES[period]){ return PERIOD_RULES[period].label; }
      return period || "";
    }

    function getServiceText(service){
      if(service == "regular cleaning"){ return "\u4e00\u822c\u6e05\u6f54"; }
      if(service == "post renovation cleaning"){ return "\u88dd\u6f62\u5f8c\u6e05\u6f54"; }
      if(service == "deep cleaning"){ return "\u5927\u6383\u9664"; }
      return "\u5176\u4ed6";
    }

    function getRoomTypeText(roomType){
      if(roomType == "studio"){ return "\u5957\u623f"; }
      if(roomType == "1 room"){ return "1\u623f"; }
      if(roomType == "2 rooms"){ return "2\u623f"; }
      if(roomType == "3 rooms"){ return "3\u623f"; }
      if(roomType == "4+ rooms"){ return "4\u623f\u4ee5\u4e0a"; }
      return "\u5176\u4ed6 / \u5099\u8a3b\u586b\u5beb";
    }

    function getPetText(pet){
      if(pet == "no pet"){ return "\u7121\u5bf5\u7269"; }
      if(pet == "cat"){ return "\u6709\u8c93"; }
      if(pet == "dog"){ return "\u6709\u72d7"; }
      return "\u5176\u4ed6\u5bf5\u7269";
    }

    function getFormData(){
      var period = document.getElementById("b_period").value;
      var service = document.getElementById("b_service").value;
      return {
        action:"createCustomerBooking",
        name:document.getElementById("b_name").value.trim(),
        phone:document.getElementById("b_phone").value.trim(),
        address:document.getElementById("b_address").value.trim(),
        date:document.getElementById("b_date").value,
        period:getPeriodText(period),
        startTime:document.getElementById("b_startTime").value,
        endTime:document.getElementById("b_endTime").value,
        service:getServiceText(service),
        roomType:getRoomTypeText(document.getElementById("b_roomType").value),
        pet:getPetText(document.getElementById("b_pet").value),
        lineUserId:liffUserId,
        note:document.getElementById("b_note").value.trim()
      };
    }

    function validateForm(data){
      if(!data.name){ return t("needName"); }
      if(!data.phone){ return t("needPhone"); }
      if(!data.address){ return t("needAddress"); }
      if(!data.date){ return t("needDate"); }
      if(!isFullDateText(data.date)){ return "\u8acb\u9078\u64c7\u5b8c\u6574\u65e5\u671f"; }
      if(!data.period){ return t("needPeriod"); }
      if(!isSelectedSlotStillCurrent()){
        return t("needSlot");
      }
      var timeError = validateSelectedTime();
      if(timeError){ return timeError; }
      return "";
    }

    function isSelectedSlotStillCurrent(){
      var key =
        document.getElementById("b_date").value + "|" +
        document.getElementById("b_period").value + "|" +
        document.getElementById("b_startTime").value + "|" +
        document.getElementById("b_endTime").value;

      return selectedSlotKey != "" &&
        selectedSlotKey == key;
    }

    function validateSelectedTime(){
      var period = document.getElementById("b_period").value;
      var rule = PERIOD_RULES[period] || PERIOD_RULES.morning;
      var start = document.getElementById("b_startTime").value;
      var end = document.getElementById("b_endTime").value;
      if(rule.starts.indexOf(start) < 0 || rule.ends.indexOf(end) < 0){
        return "\u8acb\u9078\u64c7" + rule.label + "\u6642\u6bb5\u5167\u7684\u6642\u9593";
      }
      if(minutesFromTime(end) - minutesFromTime(start) < 180){
        return "\u6bcf\u6b21\u9810\u7d04\u81f3\u5c11\u9700\u8981 3 \u5c0f\u6642";
      }
      return "";
    }

    function isFullDateText(value){
      return /^[0-9]{4}-[0-9]{2}-[0-9]{2}$/.test(String(value || ""));
    }

    function sendLineDetail(data){
      if(!liffReady || !liff.isInClient()){
        return Promise.resolve();
      }
      var timeText =
        (data.startTime || "") +
        (
          data.startTime || data.endTime ?
          "-" :
          ""
        ) +
        (data.endTime || "");

      return liff.sendMessages([{
        type:"flex",
        altText:"\u5c45\u5bb6\u6e05\u6f54\u9810\u7d04\u6210\u529f\u660e\u7d30",
        contents:{
          type:"bubble",
          size:"mega",
          header:{
            type:"box",
            layout:"vertical",
            contents:[
              {
                type:"text",
                text:"\u9810\u7d04\u6210\u529f\u660e\u7d30",
                weight:"bold",
                size:"lg",
                color:"#FFFFFF"
              },
              {
                type:"text",
                text:(liffDisplayName ? liffDisplayName + "\u60a8\u597d\uff0c" : "") + "\u7ba1\u7406\u54e1\u5df2\u6536\u5230\u901a\u77e5\uff0c\u5f8c\u7e8c\u6703\u518d\u8207\u60a8\u78ba\u8a8d",
                size:"xs",
                color:"#E8F5ED",
                margin:"xs",
                wrap:true
              }
            ],
            backgroundColor:"#2f7d57"
          },
          body:{
            type:"box",
            layout:"vertical",
            spacing:"md",
            contents:[
              buildLineFlexRow("\u5ba2\u6236\u59d3\u540d",data.name || ""),
              buildLineFlexRow("\u9810\u7d04\u65e5\u671f",data.date || ""),
              buildLineFlexRow("\u670d\u52d9\u6642\u9593",timeText),
              buildLineFlexRow("\u670d\u52d9\u9805\u76ee",data.service || ""),
              buildLineFlexRow("\u670d\u52d9\u5730\u5740",data.address || ""),
              {
                type:"separator",
                margin:"lg"
              },
              {
                type:"text",

                size:"xs",

    function jsonpRequest(params,options){
      options =
        options || {};
      return new Promise(function(resolve,reject){
        var callbackName = "jsonpCallback_" + Date.now() + "_" + Math.floor(Math.random() * 1000000);
        var script = document.createElement("script");
        var timer = setTimeout(function(){
          cleanup();
          reject(new Error("API timeout"));
        },Number(options.timeoutMs || 20000));
        function cleanup(){
          clearTimeout(timer);
          try{ delete window[callbackName]; }catch(error){ window[callbackName] = undefined; }
          if(script.parentNode){ script.parentNode.removeChild(script); }
        }
        window[callbackName] = function(result){
          cleanup();
          resolve(result || {});
        };
        script.onerror = function(){
          cleanup();
          reject(new Error("\u7cfb\u7d71\u9023\u7dda\u5931\u6557\uff0c\u8acb\u78ba\u8a8d Apps Script \u5df2\u90e8\u7f72\u6700\u65b0\u7248\u672c\u3002"));
        };
        script.async = true;
        params.callback = callbackName;
        script.src = GAS_API_URL + "?" + Object.keys(params).map(function(key){
          return encodeURIComponent(key) + "=" + encodeURIComponent(params[key]);
        }).join("&");
        document.body.appendChild(script);
      });
    }

    function renderCalendar(){
      var title = document.getElementById("calendarTitle");
      var grid = document.getElementById("calendarGrid");
      var selectedDate = document.getElementById("b_date").value;
      var today = new Date();
      var year = calendarViewDate.getFullYear();
      var month = calendarViewDate.getMonth();
      var first = new Date(year,month,1);
      var daysInMonth = new Date(year,month + 1,0).getDate();
      var startDay = first.getDay();
      var currentMonthStart = new Date(today.getFullYear(),today.getMonth(),1);
      var maxMonthStart = new Date(today.getFullYear(),today.getMonth() + 1,1);

      today.setHours(0,0,0,0);
      title.textContent = year + "\u5e74" + (month + 1) + "\u6708";
      grid.innerHTML = "";

      for(var blank = 0; blank < startDay; blank++){
        var blankCell = document.createElement("div");
        grid.appendChild(blankCell);
      }

      for(var day = 1; day <= daysInMonth; day++){
        var date = new Date(year,month,day);
        var dateText = formatDateLocal(date);
        var btn = document.createElement("button");
        var disabled =
          date < today ||
          first < currentMonthStart ||
          first > maxMonthStart;

        var dayData =
          monthAvailability[dateText];
        var num =
          document.createElement("span");
        var meta =
          document.createElement("span");

        btn.type = "button";
        btn.className = "calendarDay";
        num.className = "calendarDateNum";
        meta.className = "calendarDateMeta";
        num.textContent = day;

        if(!disabled){
          if(dayData){
            if(dayData.availableCount > 0){
              btn.classList.add("hasFree");
              meta.textContent =
                "\u53ef\u7d04" + dayData.availableCount;
            }else{
              btn.classList.add("fullDay");
              meta.textContent = "\u5df2\u6eff";
            }
          }else{
            btn.classList.add("loadingDay");
            meta.textContent = "\u67e5\u8a62\u4e2d";
          }
        }

        btn.appendChild(num);
        btn.appendChild(meta);

        if(dateText == formatDateLocal(today)){
          btn.classList.add("today");
        }

        if(dateText == selectedDate){
          btn.classList.add("selected");
        }

        if(disabled){
          btn.classList.add("disabled");
          btn.disabled = true;
        }else{
          btn.onclick = function(value){
            return function(){
              selectCalendarDate(value);
            };
          }(dateText);
        }

        grid.appendChild(btn);
      }
    }

    function loadMonthAvailability(){
      var year = calendarViewDate.getFullYear();
      var month = calendarViewDate.getMonth() + 1;
      var monthOffset =
        getCalendarMonthOffset();
      var cacheKey =
        "original_" + monthOffset;
      var calendarContainer =
        document.getElementById("calendarOriginalView");
      var modernView =
        document.getElementById("calendarModernView");
      var calendarBox =
        document.querySelector(".calendarBox");
      var selectedDate =
        document.getElementById("b_date").value;

      if(
        calendarCache[cacheKey] &&
        Date.now() - Number(calendarCache[cacheKey].cachedAt || 0) < CALENDAR_CACHE_MAX_AGE_MS
      ){
        calendarContainer.innerHTML =
          calendarCache[cacheKey].htmlData || "";
        calendarContainer.style.display = "block";
        modernView.style.display = "none";
        isMonthLoading = false;
        setupOriginalMonthViewEvents();
        return;
      }
      delete calendarCache[cacheKey];

      isMonthLoading = true;
      if(calendarBox){
        calendarBox.classList.add("loading");
      }
      if(modernView.style.display != "none"){
        renderCalendar();
      }
      if(calendarContainer){
        calendarContainer.style.opacity = "0.5";
        calendarContainer.style.pointerEvents = "none";
      }

      jsonpRequest({
        api:"getOriginalMonthViewJsonp",
        monthOffset:monthOffset,
        selectedDate:selectedDate
      })
        .then(function(result){
          if(calendarContainer){
            calendarContainer.style.opacity = "1";
            calendarContainer.style.pointerEvents = "auto";
          }
          if(calendarBox){
            calendarBox.classList.remove("loading");
          }

          if(result.status != "OK" || !result.htmlData){
            loadMonthAvailabilityFallback(
              year,
              month,
              "fallback_" + monthOffset,
              calendarContainer,
              selectedDate
            );
            return;
          }

          calendarCache[cacheKey] = {
            htmlData:result.htmlData || "",
            cachedAt:Date.now()
          };
          isMonthLoading = false;
          calendarContainer.innerHTML =
            result.htmlData || "";
          calendarContainer.style.display = "block";
          modernView.style.display = "none";
          setupOriginalMonthViewEvents();
        })
        .catch(function(error){
          if(calendarContainer){
            calendarContainer.style.opacity = "1";
            calendarContainer.style.pointerEvents = "auto";
          }
          if(calendarBox){
            calendarBox.classList.remove("loading");
          }
          loadMonthAvailabilityFallback(
            year,
            month,
            "fallback_" + monthOffset,
            calendarContainer,
            selectedDate
          );
        });
    }

        today.getMonth()

    function selectCalendarMiniSlot(event,dateText,periodText){
      triggerHaptic("light");
      if(event){
        event.stopPropagation();
        event.preventDefault();
      }

      document.getElementById("b_date").value = dateText;
      selectedSlotKey = "";
      updateSelectedDateHint(dateText);
      highlightCalendarDate(dateText);

      if(monthAvailability[dateText]){
        renderSlots(monthAvailability[dateText].slots || []);
      }

      var slots =
        monthAvailability[dateText] ?
        monthAvailability[dateText].slots || [] :
        [];
      var matched = null;

      for(var i=0;i<slots.length;i++){
        if(slots[i].period == periodText && slots[i].available){
          matched = slots[i];
          break;
        }
      }

      if(matched){
        document.getElementById("b_period").value =
          periodKeyFromText(matched.period);
        syncDefaultTime();
        document.getElementById("b_startTime").value =
          matched.startTime;
        syncEndTimeOptions(matched.endTime);
        selectedSlotKey =
          document.getElementById("b_date").value + "|" +
          document.getElementById("b_period").value + "|" +
          document.getElementById("b_startTime").value + "|" +
          document.getElementById("b_endTime").value;
        updateSelectedDateHint(
          dateText,
          matched.period + " " + matched.startTime + "-" + matched.endTime
        );
        expandBookingFormPanel();
        updateBookingProgress();
        focusNameFieldAfterSlot();
      }
    }

    function syncOriginalCalendarDayFromSlots(dateText,slots){
      var day =
        document.querySelector(
          '#calendarOriginalView .calendarDay[data-date="' +
          dateText +
          '"]'
        );
      var freeCount = 0;
      var bookedCount = 0;
      var labels = {
        "\u4e0a\u5348":"\u65e9",
        "\u4e0b\u5348":"\u5348",
        "\u665a\u4e0a":"\u665a"
      };
      var slotsHtml = "";
      var badge =
        day ? day.querySelector(".dayStatusBadge") : null;
      var summary =
        day ? day.querySelector(".calendarSummary") : null;
      var slotWrap =
        day ? day.querySelector(".calendarSlots") : null;
      var cacheKey =
        "original_" + getCalendarMonthOffset();

      if(!day){
        return;
      }

      (slots || []).forEach(function(slot){
        var isFree =
          slot && slot.available === true;
        var label =
          labels[slot.period] ||
          String(slot.period || "").charAt(0) ||
          "";

        if(isFree){
          freeCount++;
        }else{
          bookedCount++;
        }

        slotsHtml +=
          '<div class="calendarMiniSlot ' +
          (isFree ? "free" : "booked") +
          '">' +
          label +
          '</div>';
      });

      day.classList.remove("hasFree","fullBooked","fullClosed");
      day.classList.add(freeCount > 0 ? "hasFree" : "fullBooked");

      if(slotWrap){
        slotWrap.innerHTML = slotsHtml;
      }

      if(badge){
        badge.className =
          "dayStatusBadge " +
          (freeCount > 0 ? "free" : "booked");
        badge.textContent =
          freeCount > 0 ? "\u5c1a\u6709\u7a7a\u6a94" : "\u5df2\u6eff";
      }

      if(summary){
        summary.textContent =
          freeCount > 0 ?
          "\u5269 " + freeCount + " \u500b\u7a7a\u6a94" :
          "\u4eca\u65e5\u7121\u7a7a\u6a94";
      }

      if(monthAvailability[dateText]){
        monthAvailability[dateText].availableCount = freeCount;
        monthAvailability[dateText].slots = slots || [];
      }

      delete calendarCache[cacheKey];
    }

    function loadMonthAvailabilityFallback(year,month,cacheKey,calendarContainer,selectedDate){
      document.getElementById("calendarOriginalView").style.display = "none";
      document.getElementById("calendarModernView").style.display = "block";
      jsonpRequest({
        api:"getMonthAvailabilityJsonp",
        year:year,
        month:month
      })
        .then(function(result){
          if(calendarContainer){
            calendarContainer.style.opacity = "1";
            calendarContainer.style.pointerEvents = "auto";
          }

          if(result.status != "OK"){
            monthAvailability = {};
            isMonthLoading = false;
            renderCalendar();
            return;
          }

          monthAvailability = result.days || {};
          calendarCache[cacheKey] = {
            days:monthAvailability,
            htmlData:"",
            cachedAt:Date.now()
          };
          isMonthLoading = false;
          renderCalendar();
          highlightCalendarDate(selectedDate);

          if(
            selectedDate &&
            monthAvailability[selectedDate]
          ){
            renderSlots(monthAvailability[selectedDate].slots || []);
          }
        })
        .catch(function(error){
          if(calendarContainer){
            calendarContainer.style.opacity = "1";
            calendarContainer.style.pointerEvents = "auto";
          }
          monthAvailability = {};
          isMonthLoading = false;
          renderCalendar();
        });
    }

    function formatDateLocal(date){
      var y = date.getFullYear();
      var m = String(date.getMonth() + 1);
      var d = String(date.getDate());

      if(m.length < 2){ m = "0" + m; }
      if(d.length < 2){ d = "0" + d; }

      return y + "-" + m + "-" + d;
    }

    function clearSelectedSlots(){
      Array.prototype.forEach.call(document.querySelectorAll(".slotBtn"),function(item){
        item.classList.remove("selected");
      });
    }

    function loadAvailability(){
      var date = document.getElementById("b_date").value;
      var list = document.getElementById("slotList");
      selectedSlotKey = "";
      clearSelectedSlots();
      updateSelectedDateHint(date);
      if(!date){
        list.innerHTML = "";
        updateSelectedDateHint("");
        return;
      }
      if(!isFullDateText(date)){
        list.innerHTML = '<div class="status error" style="display:block;">' +
          "\u8acb\u9078\u64c7\u5b8c\u6574\u65e5\u671f" +
          '</div>';
        return;
      }
      list.innerHTML = '<div class="status" style="display:block;">' + t("loadingSlots") + '</div>';
      jsonpRequest({ api:"getAvailabilityJsonp", date:date })
        .then(function(result){
          if(result.status != "OK"){
            list.innerHTML = '<div class="status error" style="display:block;">' + (result.message || t("slotFail")) + '</div>';
            return;
          }
          renderSlots(result.slots || []);
        })
        .catch(function(error){
          list.innerHTML = '<div class="status error" style="display:block;">' +
            t("apiFail") +
            '</div>';
        });
    }

    function renderSlots(slots){
      var list = document.getElementById("slotList");
      list.innerHTML = "";
      slots.forEach(function(slot){
        var btn = document.createElement("button");
        btn.type = "button";
        btn.className = "slotBtn" + (slot.available ? "" : " full");
        btn.textContent = (slot.available ? t("available") : t("full")) + slot.period + " " + slot.startTime + "-" + slot.endTime;
        if(slot.available){
          btn.onclick = function(){ selectSlot(slot,btn); };
        }
        list.appendChild(btn);
      });
    }

    function selectSlot(slot,button){
      triggerHaptic("light");
      Array.prototype.forEach.call(document.querySelectorAll(".slotBtn"),function(item){
        item.classList.remove("selected");
      });
      button.classList.add("selected");
      document.getElementById("b_period").value = periodKeyFromText(slot.period);
      syncDefaultTime();
      document.getElementById("b_startTime").value = slot.startTime;
      syncEndTimeOptions(slot.endTime);
      selectedSlotKey =
        document.getElementById("b_date").value + "|" +
        document.getElementById("b_period").value + "|" +
        document.getElementById("b_startTime").value + "|" +
        document.getElementById("b_endTime").value;
      updateSelectedDateHint(
        document.getElementById("b_date").value,
        slot.period + " " + slot.startTime + "-" + slot.endTime
      );
      expandBookingFormPanel();
      updateBookingProgress();
      focusNameFieldAfterSlot();
    }

    function periodKeyFromText(period){
      if(period == "\u4e0a\u5348" || period == "morning"){ return "morning"; }
      if(period == "\u4e0b\u5348" || period == "afternoon"){ return "afternoon"; }
      if(period == "\u665a\u4e0a" || period == "evening"){ return "evening"; }
      return "morning";
    }

    function submitBookingApi(data){
      return jsonpRequest({
        api:"createCustomerBookingJsonp",
        payload:JSON.stringify(data)
      },{
        timeoutMs:45000
      });
    }

    function escapeText(value){
      return String(value || "")
        .replace(/&/g,"&amp;")
        .replace(/</g,"&lt;")
        .replace(/>/g,"&gt;")
        .replace(/"/g,"&quot;")
        .replace(/'/g,"&#39;");
    }

    function getSelectedOptionText(id){
      var el = document.getElementById(id);
      if(!el || el.selectedIndex < 0){
        return "";
      }
      return el.options[el.selectedIndex].text || el.value || "";
    }

    function buildConfirmRow(label,value){
      return '<div class="confirmRow">' +
        '<div class="confirmLabel">' +
        escapeText(label) +
        '</div>' +
        '<div class="confirmValue">' +
        escapeText(value || "-") +
        '</div>' +
        '</div>';
    }

    function showBookingConfirm(data){
      var timeText =
        (data.startTime || "") +
        (
          data.startTime || data.endTime ?
          "-" :
          ""
        ) +
        (data.endTime || "");
      var html =
        '<div class="confirmSummary">' +
        '<div class="confirmHero">' +
        '<div class="confirmHeroTitle">請再次確認服務時間與地址</div>' +
        '<div class="confirmHeroValue">' +
        escapeText(data.date + " " + timeText) +
        '</div>' +
        '<div class="confirmHeroValue" style="margin-top:6px;font-size:14px;">' +
        escapeText(data.address || "-") +
        '</div>' +
        '</div>' +
        buildConfirmRow("姓名",data.name) +
        buildConfirmRow("電話",data.phone) +
        buildConfirmRow("日期",data.date) +
        buildConfirmRow("時間",timeText) +
        buildConfirmRow("服務",getSelectedOptionText("b_service")) +
        buildConfirmRow("房型",getSelectedOptionText("b_roomType")) +
        buildConfirmRow("地址",data.address) +
        buildConfirmRow("寵物",getSelectedOptionText("b_pet")) +
        (
          data.note ?
          buildConfirmRow("備註",data.note) :
          ""
        ) +
        '</div>';

      return Swal.fire({
        title:"確認預約明細",
        html:html,
        icon:"question",
        showCancelButton:true,
        cancelButtonText:"返回修改",
        confirmButtonText:"送出預約",
        reverseButtons:true,
        confirmButtonColor:"#2f7d57",
        cancelButtonColor:"#718096",
        allowOutsideClick:false
      });
    }

    function submitBooking(){
      if(isSubmittingBooking){
        return;
      }
      triggerHaptic("light");
      var data = getFormData();
      var error = validateForm(data);
      if(error){
        Swal.fire(t("missingTitle"), error, "warning");
        return;
      }

      isSubmittingBooking = true;
      showBookingConfirm(data)
        .then(function(confirmResult){
          if(!confirmResult.isConfirmed){
            isSubmittingBooking = false;
            return;
          }

          setLoading(true);
          showStatus(t("submittingStatus"), false);
          submitBookingApi(data)
            .then(function(result){
              if(result.status == "BOOKED"){
                setLoading(false);
                Swal.fire(t("bookedTitle"), result.message || t("bookedFallback"), "error");
                return;
              }
              if(result.status != "OK"){
                setLoading(false);
                Swal.fire(t("failedTitle"), result.message || t("failedFallback"), "error");
                return;
              }
              clearFrontendCalendarCache();
              loadMonthAvailability();
              Swal.fire({
                title:t("successTitle"),
                text:t("successText"),
                icon:"success",
                showConfirmButton:false,
                timer:1200
              });
              triggerHaptic("success");
              sendLineDetail(data)
                .then(function(){
                  setLoading(false);
                  if(liffReady && liff.isInClient()){
                    setTimeout(function(){ liff.closeWindow(); },600);
                  }else{
                    showStatus(t("notLine"), false);
                  }
                })
                .catch(function(error){
                  setLoading(false);
                  alert(t("lineFail") + JSON.stringify(error));
                });
            })
            .catch(function(error){
              setLoading(false);
              var message =
                error && error.message == "API timeout" ?
                "\u7cfb\u7d71\u56de\u61c9\u8f03\u6162\uff0c\u9810\u7d04\u53ef\u80fd\u5df2\u9001\u51fa\u3002\u8acb\u5148\u4e0d\u8981\u91cd\u8907\u9001\u51fa\uff0c\u7a0d\u5019\u67e5\u770b LINE \u6216\u806f\u7d61\u7ba1\u7406\u54e1\u78ba\u8a8d\u3002" :
                (error && error.message ? error.message : t("apiFail"));
              Swal.fire(
                t("connectionFail"),
                message,
                "error"
              );
            });
        });
    }

    document.addEventListener("DOMContentLoaded",function(){
      syncDefaultTime();
      bindBookingProgressEvents();
      bindCalendarGridEvents();
      calendarViewDate =
        new Date(
          new Date().getFullYear(),
          new Date().getMonth(),
          1
        );
      renderCalendar();
      loadMonthAvailability();
      initLiff();
      updateBookingProgress();
    });

    document.addEventListener("visibilitychange",function(){
      if(document.hidden){
        lastPageHiddenAt = new Date().getTime();
        return;
      }

      if(
        lastPageHiddenAt &&
        new Date().getTime() - lastPageHiddenAt > 1000
      ){
        refreshMonthAvailabilityAfterReturn();
      }
    });

    window.addEventListener("pageshow",function(event){
      if(event.persisted){
        refreshMonthAvailabilityAfterReturn();
      }
    });

    window.addEventListener("focus",function(){
      if(
        lastPageHiddenAt &&
        new Date().getTime() - lastPageHiddenAt > 1000
      ){
        refreshMonthAvailabilityAfterReturn();
      }
    });
  </script>
</body>
</html>
