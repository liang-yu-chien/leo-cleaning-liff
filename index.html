    /* 原版 GAS 前台月曆：隔離新版小月曆的全域樣式，避免日期格和早中晚標籤被擠在一起 */

<body>
  <div class="page">

          <div class="sub">LINE &#32218;&#19978;&#38928;&#32004;&#12290;&#38928;&#32004;&#25104;&#31435;&#24460;&#65292;&#26126;&#32048;&#26371;&#33258;&#21205;&#20659;&#22238;&#32842;&#22825;&#23460;&#12290;</div>

        <option value="no pet">&#28961;&#23541;&#29289;</option>

        <option value="other pet">&#20854;&#20182;&#23541;&#29289;</option>

      <label for="b_note">&#20633;&#35387;</label>
      <textarea id="b_note" placeholder="&#21487;&#22635;&#23531;&#29305;&#27530;&#38656;&#27714;&#12289;&#20572;&#36554;&#12289;&#38272;&#31105;&#31561;&#36039;&#35338;"></textarea>
      <button id="submitBtn" class="btn" type="button" onclick="submitBooking()">&#36865;&#20986;&#38928;&#32004;</button>
      <div class="hint">&#35531;&#22312; LINE &#23448;&#26041;&#24115;&#34399;&#20839;&#38283;&#21855;&#27492;&#38913;&#65292;&#25165;&#33021;&#33258;&#21205;&#20659;&#36865;&#38928;&#32004;&#26126;&#32048;&#12290;</div>
    </div>

  <script>
    var LIFF_ID = "2010106417-lLCmAcx2";
    var GAS_API_URL = "https://script.google.com/macros/s/AKfycbzdX6xdKv9bGb-RWeMWet059muWd_Lm0RjsUDdWGbSNrdid_rozpjpHgK4lYW7OJKPs/exec";
    var liffReady = false;
    var selectedSlotKey = "";
    var monthAvailability = {};
    var calendarCache = {};
    var isMonthLoading = false;
    var PERIOD_RULES = {
      morning:{
        label:"\u4e0a\u5348",
        starts:["08:00","08:30","09:00"],
        ends:["11:00","11:30","12:00"],
        defaultStart:"08:00",
        defaultEnd:"12:00"
      },
      afternoon:{
        label:"\u4e0b\u5348",
        starts:["13:30","14:00","14:30"],
        ends:["16:30","17:00","17:30"],
        defaultStart:"13:30",
        defaultEnd:"17:30"
      },
      evening:{
        label:"\u665a\u4e0a",
        starts:["17:30"],
        ends:["20:30"],
        defaultStart:"17:30",
        defaultEnd:"20:30"
      }
    };
    var calendarViewDate = new Date();

    function t(key){
      var map = {
        submit:"\u9001\u51fa\u9810\u7d04",
        submitting:"\u9001\u51fa\u4e2d...",
        liffFail:"LIFF \u521d\u59cb\u5316\u5931\u6557\uff1a",
        missingTitle:"\u8cc7\u6599\u672a\u5b8c\u6210",
        needName:"\u8acb\u8f38\u5165\u59d3\u540d",
        needPhone:"\u8acb\u8f38\u5165\u96fb\u8a71",
        needAddress:"\u8acb\u8f38\u5165\u670d\u52d9\u5730\u5740",
        needDate:"\u8acb\u9078\u64c7\u65e5\u671f",
        needPeriod:"\u8acb\u9078\u64c7\u6642\u6bb5",
        loadingSlots:"\u6b63\u5728\u67e5\u8a62\u7a7a\u6a94...",
        slotFail:"\u7a7a\u6a94\u67e5\u8a62\u5931\u6557",
        apiFail:"\u7cfb\u7d71\u9023\u7dda\u5931\u6557\uff0c\u8acb\u91cd\u65b0\u958b\u555f\u9810\u7d04\u9801\u518d\u8a66\u3002",
        needSlot:"\u8acb\u5148\u9ede\u9078\u4e0a\u65b9\u7da0\u8272\u53ef\u9810\u7d04\u6642\u6bb5",
        available:"\u53ef\u9810\u7d04 ",
        full:"\u5df2\u6eff ",
        submittingStatus:"\u9810\u7d04\u9001\u51fa\u4e2d\uff0c\u8acb\u7a0d\u5019...",
        bookedTitle:"\u6642\u6bb5\u5df2\u88ab\u9810\u7d04",
        bookedFallback:"\u8acb\u91cd\u65b0\u9078\u64c7\u6642\u6bb5\u3002",
        failedTitle:"\u9810\u7d04\u5931\u6557",
        failedFallback:"\u8acb\u7a0d\u5f8c\u518d\u8a66\u3002",
        successTitle:"\u9810\u7d04\u6210\u529f",
        successText:"\u6b63\u5728\u540c\u6b65\u660e\u7d30\u5230 LINE \u804a\u5929\u5ba4...",
        notLine:"\u9810\u7d04\u6210\u529f\u3002\u6b64\u9801\u4e0d\u662f\u5728 LINE \u5167\u958b\u555f\uff0c\u56e0\u6b64\u4e0d\u6703\u81ea\u52d5\u95dc\u9589\u3002",
        lineFail:"LINE \u50b3\u8a0a\u5931\u6557\uff1a",
        connectionFail:"\u9023\u7dda\u5931\u6557"
      };
      return map[key] || key;
    }

    function showStatus(message,isError){
      var box = document.getElementById("statusBox");
      box.textContent = message;
      box.className = "status" + (isError ? " error" : "");
      box.style.display = "block";
    }

    function setLoading(isLoading){
      var btn = document.getElementById("submitBtn");
      btn.disabled = isLoading;
      btn.textContent = isLoading ? t("submitting") : t("submit");
    }

    function initLiff(){
      return liff.init({ liffId: LIFF_ID })
        .then(function(){
          liffReady = true;
          if(!liff.isLoggedIn() && liff.isInClient()){
            liff.login();
          }
        })
        .catch(function(error){
          showStatus(t("liffFail") + (error.message || error), true);
        });
    }

    function syncDefaultTime(){
      selectedSlotKey = "";
      var period = document.getElementById("b_period").value;
      var rule = PERIOD_RULES[period] || PERIOD_RULES.morning;
      setSelectOptions(document.getElementById("b_startTime"),rule.starts);
      document.getElementById("b_startTime").value = rule.defaultStart;
      syncEndTimeOptions(rule.defaultEnd);
    }

    function syncEndTimeOptions(preferredEnd){
      var period = document.getElementById("b_period").value;
      var rule = PERIOD_RULES[period] || PERIOD_RULES.morning;
      var start = document.getElementById("b_startTime").value || rule.defaultStart;
      var minEnd = minutesFromTime(start) + 180;
      var validEnds = rule.ends.filter(function(time){
        return minutesFromTime(time) >= minEnd;
      });
      if(validEnds.length == 0){
        validEnds = [rule.defaultEnd];
      }
      setSelectOptions(document.getElementById("b_endTime"),validEnds);
      document.getElementById("b_endTime").value =
        validEnds.indexOf(preferredEnd) >= 0 ? preferredEnd : validEnds[validEnds.length - 1];
    }

    function setSelectOptions(select,values){
      select.innerHTML = "";
      values.forEach(function(value){
        var option = document.createElement("option");
        option.value = value;
        option.textContent = value;
        select.appendChild(option);
      });
    }

    function minutesFromTime(value){
      var parts = String(value || "00:00").split(":");
      return Number(parts[0]) * 60 + Number(parts[1]);
    }

    function getPeriodText(period){
      if(PERIOD_RULES[period]){ return PERIOD_RULES[period].label; }
      return period || "";
    }

    function getServiceText(service){
      if(service == "regular cleaning"){ return "\u4e00\u822c\u6e05\u6f54"; }
      if(service == "post renovation cleaning"){ return "\u88dd\u6f62\u5f8c\u6e05\u6f54"; }
      if(service == "deep cleaning"){ return "\u5927\u6383\u9664"; }
      return "\u5176\u4ed6";
    }

    function getPetText(pet){
      if(pet == "no pet"){ return "\u7121\u5bf5\u7269"; }
      if(pet == "cat"){ return "\u6709\u8c93"; }
      if(pet == "dog"){ return "\u6709\u72d7"; }
      return "\u5176\u4ed6\u5bf5\u7269";
    }

    function getFormData(){
      var period = document.getElementById("b_period").value;
      var service = document.getElementById("b_service").value;
      return {
        action:"createCustomerBooking",
        name:document.getElementById("b_name").value.trim(),
        phone:document.getElementById("b_phone").value.trim(),
        address:document.getElementById("b_address").value.trim(),
        date:document.getElementById("b_date").value,
        period:getPeriodText(period),
        startTime:document.getElementById("b_startTime").value,
        endTime:document.getElementById("b_endTime").value,
        service:getServiceText(service),
        roomType:document.getElementById("b_roomType").value,
        pet:getPetText(document.getElementById("b_pet").value),
        note:document.getElementById("b_note").value.trim()
      };
    }

    function validateForm(data){
      if(!data.name){ return t("needName"); }
      if(!data.phone){ return t("needPhone"); }
      if(!data.address){ return t("needAddress"); }
      if(!data.date){ return t("needDate"); }
      if(!isFullDateText(data.date)){ return "\u8acb\u9078\u64c7\u5b8c\u6574\u65e5\u671f"; }
      if(!data.period){ return t("needPeriod"); }
      if(!isSelectedSlotStillCurrent()){
        return t("needSlot");
      }
      var timeError = validateSelectedTime();
      if(timeError){ return timeError; }
      return "";
    }

    function isSelectedSlotStillCurrent(){
      var key =
        document.getElementById("b_date").value + "|" +
        document.getElementById("b_period").value + "|" +
        document.getElementById("b_startTime").value + "|" +
        document.getElementById("b_endTime").value;

      return selectedSlotKey != "" &&
        selectedSlotKey == key;
    }

    function validateSelectedTime(){
      var period = document.getElementById("b_period").value;
      var rule = PERIOD_RULES[period] || PERIOD_RULES.morning;
      var start = document.getElementById("b_startTime").value;
      var end = document.getElementById("b_endTime").value;
      if(rule.starts.indexOf(start) < 0 || rule.ends.indexOf(end) < 0){
        return "\u8acb\u9078\u64c7" + rule.label + "\u6642\u6bb5\u5167\u7684\u6642\u9593";
      }
      if(minutesFromTime(end) - minutesFromTime(start) < 180){
        return "\u6bcf\u6b21\u9810\u7d04\u81f3\u5c11\u9700\u8981 3 \u5c0f\u6642";
      }
      return "";
    }

    function isFullDateText(value){
      return /^[0-9]{4}-[0-9]{2}-[0-9]{2}$/.test(String(value || ""));
    }

    function sendLineDetail(data){
      if(!liffReady || !liff.isInClient()){
        return Promise.resolve();
      }
      var br = String.fromCharCode(10);
      var text =
        "\u2705 \u9810\u7d04\u6210\u529f\u901a\u77e5" + br +
        "--------------------" + br +
        "\u59d3\u540d\uff1a" + data.name + br +
        "\u65e5\u671f\uff1a" + data.date + br +
        "\u6642\u9593\uff1a" + data.startTime + "-" + data.endTime + br +
        "\u670d\u52d9\uff1a" + data.service + br +
        "\u5730\u5740\uff1a" + data.address + br +
        "--------------------" + br +
        "\u7ba1\u7406\u54e1\u5df2\u540c\u6b65\u6536\u5230\u901a\u77e5\uff0c\u5f8c\u7e8c\u6703\u518d\u8207\u60a8\u78ba\u8a8d\u3002";
      return liff.sendMessages([{ type:"text", text:text }]);
    }

    function jsonpRequest(params){
      return new Promise(function(resolve,reject){
        var callbackName = "jsonpCallback_" + Date.now() + "_" + Math.floor(Math.random() * 1000000);
        var script = document.createElement("script");
        var timer = setTimeout(function(){
          cleanup();
          reject(new Error("API timeout"));
        },20000);
        function cleanup(){
          clearTimeout(timer);
          try{ delete window[callbackName]; }catch(error){ window[callbackName] = undefined; }
          if(script.parentNode){ script.parentNode.removeChild(script); }
        }
        window[callbackName] = function(result){
          cleanup();
          resolve(result || {});
        };
        script.onerror = function(){
          cleanup();
          reject(new Error("\u7cfb\u7d71\u9023\u7dda\u5931\u6557\uff0c\u8acb\u78ba\u8a8d Apps Script \u5df2\u90e8\u7f72\u6700\u65b0\u7248\u672c\u3002"));
        };
        params.callback = callbackName;
        script.src = GAS_API_URL + "?" + Object.keys(params).map(function(key){
          return encodeURIComponent(key) + "=" + encodeURIComponent(params[key]);
        }).join("&");
        document.body.appendChild(script);
      });
    }

    function renderCalendar(){
      var title = document.getElementById("calendarTitle");
      var grid = document.getElementById("calendarGrid");
      var selectedDate = document.getElementById("b_date").value;
      var today = new Date();
      var year = calendarViewDate.getFullYear();
      var month = calendarViewDate.getMonth();
      var first = new Date(year,month,1);
      var daysInMonth = new Date(year,month + 1,0).getDate();
      var startDay = first.getDay();
      var currentMonthStart = new Date(today.getFullYear(),today.getMonth(),1);
      var maxMonthStart = new Date(today.getFullYear(),today.getMonth() + 1,1);

      today.setHours(0,0,0,0);
      title.textContent = year + "\u5e74" + (month + 1) + "\u6708";
      grid.innerHTML = "";

      for(var blank = 0; blank < startDay; blank++){
        var blankCell = document.createElement("div");
        grid.appendChild(blankCell);
      }

      for(var day = 1; day <= daysInMonth; day++){
        var date = new Date(year,month,day);
        var dateText = formatDateLocal(date);
        var btn = document.createElement("button");
        var disabled =
          date < today ||
          first < currentMonthStart ||
          first > maxMonthStart;

        var dayData =
          monthAvailability[dateText];
        var num =
          document.createElement("span");
        var meta =
          document.createElement("span");

        btn.type = "button";
        btn.className = "calendarDay";
        num.className = "calendarDateNum";
        meta.className = "calendarDateMeta";
        num.textContent = day;

        if(!disabled){
          if(dayData){
            if(dayData.availableCount > 0){
              btn.classList.add("hasFree");
              meta.textContent =
                "\u53ef\u7d04" + dayData.availableCount;
            }else{
              btn.classList.add("fullDay");
              meta.textContent = "\u5df2\u6eff";
            }
          }else{
            btn.classList.add("loadingDay");
            meta.textContent = "\u67e5\u8a62\u4e2d";
          }
        }

        btn.appendChild(num);
        btn.appendChild(meta);

        if(dateText == formatDateLocal(today)){
          btn.classList.add("today");
        }

        if(dateText == selectedDate){
          btn.classList.add("selected");
        }

        if(disabled){
          btn.classList.add("disabled");
          btn.disabled = true;
        }else{
          btn.onclick = function(value){
            return function(){
              selectCalendarDate(value);
            };
          }(dateText);
        }

        grid.appendChild(btn);
      }
    }

    function updateCalendarTitle(){
      var title = document.getElementById("calendarTitle");
      var year = calendarViewDate.getFullYear();
      var month = calendarViewDate.getMonth();
      title.textContent = year + "\u5e74" + (month + 1) + "\u6708";
    }

    function moveCalendarMonth(offset){
      var today = new Date();
      var target =
        new Date(
          calendarViewDate.getFullYear(),
          calendarViewDate.getMonth() + offset,
          1
        );
      var minMonth =
        new Date(today.getFullYear(),today.getMonth(),1);
      var maxMonth =
        new Date(today.getFullYear(),today.getMonth() + 1,1);

      if(target < minMonth || target > maxMonth){
        return;
      }

      calendarViewDate = target;
      monthAvailability = {};
      renderCalendar();
      loadMonthAvailability();
    }

    function selectCalendarDate(dateText){
      document.getElementById("b_date").value = dateText;
      selectedSlotKey = "";
      clearSelectedSlots();
      highlightCalendarDate(dateText);
      if(monthAvailability[dateText]){
        renderSlots(monthAvailability[dateText].slots || []);
      }else{
        loadAvailability();
      }
    }

    function highlightCalendarDate(dateText){
      Array.prototype.forEach.call(document.querySelectorAll(".calendarDay"),function(item){
        item.classList.remove("selected");
      });

      var selected =
        document.querySelector('.calendarDay[data-date="' + dateText + '"]');

      if(selected){
        selected.classList.add("selected");
      }
    }

    function loadMonthAvailability(){
      var year = calendarViewDate.getFullYear();
      var month = calendarViewDate.getMonth() + 1;
      var monthOffset =
        getCalendarMonthOffset();
      var cacheKey =
        "original_" + monthOffset;
      var calendarContainer =
        document.getElementById("calendarOriginalView");
      var modernView =
        document.getElementById("calendarModernView");
      var selectedDate =
        document.getElementById("b_date").value;

      if(calendarCache[cacheKey]){
        calendarContainer.innerHTML =
          calendarCache[cacheKey].htmlData || "";
        calendarContainer.style.display = "block";
        modernView.style.display = "none";
        isMonthLoading = false;
        setupOriginalMonthViewEvents();
        return;
      }

      isMonthLoading = true;
      if(modernView.style.display != "none"){
        renderCalendar();
      }
      if(calendarContainer){
        calendarContainer.style.opacity = "0.5";
        calendarContainer.style.pointerEvents = "none";
      }

      jsonpRequest({
        api:"getOriginalMonthViewJsonp",
        monthOffset:monthOffset,
        selectedDate:selectedDate
      })
        .then(function(result){
          if(calendarContainer){
            calendarContainer.style.opacity = "1";
            calendarContainer.style.pointerEvents = "auto";
          }

          if(result.status != "OK" || !result.htmlData){
            loadMonthAvailabilityFallback(
              year,
              month,
              "fallback_" + monthOffset,
              calendarContainer,
              selectedDate
            );
            return;
          }

          calendarCache[cacheKey] = {
            htmlData:result.htmlData || ""
          };
          isMonthLoading = false;
          calendarContainer.innerHTML =
            result.htmlData || "";
          calendarContainer.style.display = "block";
          modernView.style.display = "none";
          setupOriginalMonthViewEvents();
        })
        .catch(function(error){
          if(calendarContainer){
            calendarContainer.style.opacity = "1";
            calendarContainer.style.pointerEvents = "auto";
          }
          loadMonthAvailabilityFallback(
            year,
            month,
            "fallback_" + monthOffset,
            calendarContainer,
            selectedDate
          );
        });
    }

    function getCalendarMonthOffset(){
      var today = new Date();
      return (
        calendarViewDate.getFullYear() -
        today.getFullYear()
      ) * 12 +
      (
        calendarViewDate.getMonth() -
        today.getMonth()
      );
    }

    function renderCalendarGridData(data){
      var grid = document.getElementById("calendarGrid");
      var selectedDate = document.getElementById("b_date").value;
      var html = "";

      if(!data){
        renderCalendar();
        return;
      }

      document.getElementById("calendarTitle").textContent =
        data.year + "\u5e74" + data.month + "\u6708";
      monthAvailability = {};

      for(var blank=0;blank<Number(data.firstDay || 0);blank++){
        html += "<div></div>";
      }

      (data.days || []).forEach(function(dayInfo){
        var slotsArray =
          dayInfo.slotsArray || [];
        var availableCount =
          Number(dayInfo.availableCount || 0);
        var dayClass =
          "calendarDay withSlots" +
          (dayInfo.isPast ? " disabled" : "") +
          (dayInfo.isToday ? " today" : "") +
          (!dayInfo.isPast && availableCount > 0 ? " hasFree" : "") +
          (!dayInfo.isPast && availableCount <= 0 ? " fullDay" : "") +
          (dayInfo.dateText == selectedDate ? " selected" : "");

        monthAvailability[dayInfo.dateText] = {
          date:dayInfo.dateText,
          availableCount:availableCount,
          slots:slotsArray
        };

        html +=
          '<div class="' + dayClass + '" data-date="' + dayInfo.dateText + '"' +
          '>' +
          '<span class="calendarDateNum">' + dayInfo.day + '</span>' +
          '<div class="calendarSlotStack">' +
          renderCalendarMiniSlot(dayInfo.dateText,dayInfo.slots.morning) +
          renderCalendarMiniSlot(dayInfo.dateText,dayInfo.slots.afternoon) +
          renderCalendarMiniSlot(dayInfo.dateText,dayInfo.slots.evening) +
          '</div>' +
          '</div>';
      });

      grid.innerHTML = html;
    }

    function renderCalendarMiniSlot(dateText,slot){
      slot =
        slot || {};

      if(slot.available){
        return '<button type="button" class="calendarMiniSlot free" data-date="' +
          dateText +
          '" data-period="' +
          slot.period +
          '">' +
          slot.label +
          '</button>';
      }

      return '<button type="button" class="calendarMiniSlot full" disabled>' +
        (slot.label || "") +
        '</button>';
    }

    function selectCalendarMiniSlot(event,dateText,periodText){
      if(event){
        event.stopPropagation();
        event.preventDefault();
      }

      document.getElementById("b_date").value = dateText;
      selectedSlotKey = "";
      highlightCalendarDate(dateText);

      if(monthAvailability[dateText]){
        renderSlots(monthAvailability[dateText].slots || []);
      }

      var slots =
        monthAvailability[dateText] ?
        monthAvailability[dateText].slots || [] :
        [];
      var matched = null;

      for(var i=0;i<slots.length;i++){
        if(slots[i].period == periodText && slots[i].available){
          matched = slots[i];
          break;
        }
      }

      if(matched){
        document.getElementById("b_period").value =
          periodKeyFromText(matched.period);
        syncDefaultTime();
        document.getElementById("b_startTime").value =
          matched.startTime;
        syncEndTimeOptions(matched.endTime);
        selectedSlotKey =
          document.getElementById("b_date").value + "|" +
          document.getElementById("b_period").value + "|" +
          document.getElementById("b_startTime").value + "|" +
          document.getElementById("b_endTime").value;
      }
    }

    function setupOriginalMonthViewEvents(){
      Array.prototype.forEach.call(
        document.querySelectorAll("#calendarOriginalView .bookableSlot"),
        function(slot){
          if(slot.getAttribute("data-bound") == "1"){
            return;
          }
          slot.setAttribute("data-bound","1");
          slot.addEventListener("click",function(event){
            event.preventDefault();
            selectOriginalBookableSlot(slot);
          });
        }
      );
    }

    function selectOriginalBookableSlot(slot){
      var dateText =
        slot.getAttribute("data-date") || "";
      var periodText =
        slot.getAttribute("data-period") || "";

      document.getElementById("b_date").value = dateText;
      document.getElementById("b_period").value =
        periodKeyFromText(periodText);
      syncDefaultTime();
      selectedSlotKey =
        document.getElementById("b_date").value + "|" +
        document.getElementById("b_period").value + "|" +
        document.getElementById("b_startTime").value + "|" +
        document.getElementById("b_endTime").value;

      Array.prototype.forEach.call(
        document.querySelectorAll("#calendarOriginalView .bookableSlot"),
        function(item){
          item.classList.remove("selected");
        }
      );
      slot.classList.add("selected");
      showStatus(
        "\u5df2\u9078\u64c7\uff1a" +
        dateText +
        " " +
        periodText,
        false
      );
    }

    function changeMonth(delta){
      moveCalendarMonth(delta);
    }

    function goCurrentMonth(){
      calendarViewDate =
        new Date(
          new Date().getFullYear(),
          new Date().getMonth(),
          1
        );
      loadMonthAvailability();
    }

    function showCustomerDaySlots(dateText){
      document.getElementById("b_date").value = dateText;
      selectedSlotKey = "";
      loadOriginalDaySlots(dateText);
    }

    function reloadSelectedDay(){
      var dateText =
        document.getElementById("b_date").value;

      if(dateText){
        loadOriginalDaySlots(dateText);
      }
    }

    function loadOriginalDaySlots(dateText){
      var content =
        document.getElementById("dayDetailContent");
      var title =
        document.getElementById("dayDetailTitle");

      if(title){
        title.textContent = dateText;
      }
      if(content){
        content.innerHTML =
          '<div class="status" style="display:block;">' +
          t("loadingSlots") +
          '</div>';
      }

      jsonpRequest({
        api:"getAvailabilityJsonp",
        date:dateText
      })
        .then(function(result){
          if(result.status != "OK"){
            if(content){
              content.innerHTML =
                '<div class="status error" style="display:block;">' +
                (result.message || t("slotFail")) +
                '</div>';
            }
            return;
          }

          if(content){
            content.innerHTML =
              renderOriginalDaySlotsHtml(
                dateText,
                result.slots || []
              );
            setupOriginalMonthViewEvents();
          }
          renderSlots(result.slots || []);
        })
        .catch(function(error){
          if(content){
            content.innerHTML =
              '<div class="status error" style="display:block;">' +
              t("apiFail") +
              '</div>';
          }
        });
    }

    function renderOriginalDaySlotsHtml(dateText,slots){
      var html = "";

      (slots || []).forEach(function(slot){
        if(slot.available){
          html +=
            '<div role="button" tabindex="0" class="slot slotAvailable bookableSlot" data-date="' +
            dateText +
            '" data-period="' +
            slot.period +
            '" data-label="' +
            dateText +
            " " +
            slot.period +
            "(" +
            slot.startTime +
            "-" +
            slot.endTime +
            ')">' +
            '<span class="slotMain"><span class="slotName">\u53ef\u9810\u7d04</span>' +
            '<span class="slotTime">' +
            slot.period +
            "(" +
            slot.startTime +
            "-" +
            slot.endTime +
            ')</span></span><span class="slotAction">\u9810\u7d04</span></div>';
        }else{
          html +=
            '<div class="slot slotFull"><span class="slotMain"><span class="slotName">\u5df2\u6eff</span>' +
            '<span class="slotTime">' +
            slot.period +
            "(" +
            slot.startTime +
            "-" +
            slot.endTime +
            ')</span></span><span class="slotAction">\u4e0d\u53ef\u9810\u7d04</span></div>';
        }
      });

      if(html == ""){
        html =
          '<div class="emptyDay">\u6b64\u65e5\u6c92\u6709\u53ef\u9810\u7d04\u6642\u6bb5</div>';
      }

      return html;
    }

    function bindCalendarGridEvents(){
      var grid =
        document.getElementById("calendarGrid");

      if(!grid || grid.getAttribute("data-bound") == "1"){
        return;
      }

      grid.setAttribute("data-bound","1");
      grid.addEventListener("click",function(event){
        var mini =
          event.target.closest(".calendarMiniSlot.free");

        if(mini){
          selectCalendarMiniSlot(
            event,
            mini.getAttribute("data-date"),
            mini.getAttribute("data-period")
          );
          return;
        }

        var day =
          event.target.closest(".calendarDay");

        if(
          day &&
          !day.classList.contains("disabled") &&
          day.getAttribute("data-date")
        ){
          selectCalendarDate(
            day.getAttribute("data-date")
          );
        }
      });
    }

    function loadMonthAvailabilityFallback(year,month,cacheKey,calendarContainer,selectedDate){
      document.getElementById("calendarOriginalView").style.display = "none";
      document.getElementById("calendarModernView").style.display = "block";
      jsonpRequest({
        api:"getMonthAvailabilityJsonp",
        year:year,
        month:month
      })
        .then(function(result){
          if(calendarContainer){
            calendarContainer.style.opacity = "1";
            calendarContainer.style.pointerEvents = "auto";
          }

          if(result.status != "OK"){
            monthAvailability = {};
            isMonthLoading = false;
            renderCalendar();
            return;
          }

          monthAvailability = result.days || {};
          calendarCache[cacheKey] = {
            days:monthAvailability,
            htmlData:""
          };
          isMonthLoading = false;
          renderCalendar();
          highlightCalendarDate(selectedDate);

          if(
            selectedDate &&
            monthAvailability[selectedDate]
          ){
            renderSlots(monthAvailability[selectedDate].slots || []);
          }
        })
        .catch(function(error){
          if(calendarContainer){
            calendarContainer.style.opacity = "1";
            calendarContainer.style.pointerEvents = "auto";
          }
          monthAvailability = {};
          isMonthLoading = false;
          renderCalendar();
        });
    }

    function formatDateLocal(date){
      var y = date.getFullYear();
      var m = String(date.getMonth() + 1);
      var d = String(date.getDate());

      if(m.length < 2){ m = "0" + m; }
      if(d.length < 2){ d = "0" + d; }

      return y + "-" + m + "-" + d;
    }

    function clearSelectedSlots(){
      Array.prototype.forEach.call(document.querySelectorAll(".slotBtn"),function(item){
        item.classList.remove("selected");
      });
    }

    function loadAvailability(){
      var date = document.getElementById("b_date").value;
      var list = document.getElementById("slotList");
      selectedSlotKey = "";
      clearSelectedSlots();
      if(!date){
        list.innerHTML = "";
        return;
      }
      if(!isFullDateText(date)){
        list.innerHTML = '<div class="status error" style="display:block;">' +
          "\u8acb\u9078\u64c7\u5b8c\u6574\u65e5\u671f" +
          '</div>';
        return;
      }
      list.innerHTML = '<div class="status" style="display:block;">' + t("loadingSlots") + '</div>';
      jsonpRequest({ api:"getAvailabilityJsonp", date:date })
        .then(function(result){
          if(result.status != "OK"){
            list.innerHTML = '<div class="status error" style="display:block;">' + (result.message || t("slotFail")) + '</div>';
            return;
          }
          renderSlots(result.slots || []);
        })
        .catch(function(error){
          list.innerHTML = '<div class="status error" style="display:block;">' +
            t("apiFail") +
            '</div>';
        });
    }

    function renderSlots(slots){
      var list = document.getElementById("slotList");
      list.innerHTML = "";
      slots.forEach(function(slot){
        var btn = document.createElement("button");
        btn.type = "button";
        btn.className = "slotBtn" + (slot.available ? "" : " full");
        btn.textContent = (slot.available ? t("available") : t("full")) + slot.period + " " + slot.startTime + "-" + slot.endTime;
        if(slot.available){
          btn.onclick = function(){ selectSlot(slot,btn); };
        }
        list.appendChild(btn);
      });
    }

    function selectSlot(slot,button){
      Array.prototype.forEach.call(document.querySelectorAll(".slotBtn"),function(item){
        item.classList.remove("selected");
      });
      button.classList.add("selected");
      document.getElementById("b_period").value = periodKeyFromText(slot.period);
      syncDefaultTime();
      document.getElementById("b_startTime").value = slot.startTime;
      syncEndTimeOptions(slot.endTime);
      selectedSlotKey =
        document.getElementById("b_date").value + "|" +
        document.getElementById("b_period").value + "|" +
        document.getElementById("b_startTime").value + "|" +
        document.getElementById("b_endTime").value;
    }

    function periodKeyFromText(period){
      if(period == "\u4e0a\u5348" || period == "morning"){ return "morning"; }
      if(period == "\u4e0b\u5348" || period == "afternoon"){ return "afternoon"; }
      if(period == "\u665a\u4e0a" || period == "evening"){ return "evening"; }
      return "morning";
    }

    function submitBookingApi(data){
      return jsonpRequest({
        api:"createCustomerBookingJsonp",
        payload:JSON.stringify(data)
      });
    }

    function submitBooking(){
      var data = getFormData();
      var error = validateForm(data);
      if(error){
        Swal.fire(t("missingTitle"), error, "warning");
        return;
      }
      setLoading(true);
      showStatus(t("submittingStatus"), false);
      submitBookingApi(data)
        .then(function(result){
          if(result.status == "BOOKED"){
            setLoading(false);
            Swal.fire(t("bookedTitle"), result.message || t("bookedFallback"), "error");
            return;
          }
          if(result.status != "OK"){
            setLoading(false);
            Swal.fire(t("failedTitle"), result.message || t("failedFallback"), "error");
            return;
          }
          Swal.fire({
            title:t("successTitle"),
            text:t("successText"),
            icon:"success",
            showConfirmButton:false,
            timer:1200
          });
          sendLineDetail(data)
            .then(function(){
              setLoading(false);
              if(liffReady && liff.isInClient()){
                setTimeout(function(){ liff.closeWindow(); },600);
              }else{
                showStatus(t("notLine"), false);
              }
            })
            .catch(function(error){
              setLoading(false);
              alert(t("lineFail") + JSON.stringify(error));
            });
        })
        .catch(function(error){
          setLoading(false);
          Swal.fire(t("connectionFail"), t("apiFail"), "error");
        });
    }

    document.addEventListener("DOMContentLoaded",function(){
      syncDefaultTime();
      bindCalendarGridEvents();
      calendarViewDate =
        new Date(
          new Date().getFullYear(),
          new Date().getMonth(),
          1
        );
      renderCalendar();
      loadMonthAvailability();
      initLiff();
    });
  </script>
